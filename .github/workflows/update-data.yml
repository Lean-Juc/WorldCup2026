name: Update World Cup data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: wc-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch results from Wikipedia
        run: node scripts/update-data.js

      - name: Commit if changed
        run: |
          git config user.name  "wc-bot"
          git config user.email "wc-bot@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No change."
          else
            git commit -m "🤖 Update results $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main
            git push
          fi
